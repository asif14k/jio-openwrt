name: Build ImmortalWrt for Jio JIDU6801

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt-mt798x/staging_dir
            immortalwrt-mt798x/build_dir
            immortalwrt-mt798x/dl
          key: toolchain-mt7986-${{ hashFiles('config/jidu6801.config') }}
          restore-keys: |
            toolchain-mt7986-

      - name: Clone ImmortalWrt
        run: |
          if [ ! -d "immortalwrt-mt798x" ]; then
            git clone --depth=1 https://github.com/hanwckf/immortalwrt-mt798x.git
          fi
          cd immortalwrt-mt798x
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom config
        run: |
          cp config/jidu6801.config immortalwrt-mt798x/.config

      - name: Build firmware
        run: |
          cd immortalwrt-mt798x
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: List built files
        run: |
          echo "=== All firmware files ==="
          find immortalwrt-mt798x/bin -type f \( -name "*.bin" -o -name "*.img" \) 2>/dev/null || true
          echo "=== Target directory ==="
          ls -la immortalwrt-mt798x/bin/targets/mediatek/mt7986/ || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: jidu6801-firmware
          path: immortalwrt-mt798x/bin/targets/mediatek/mt7986/